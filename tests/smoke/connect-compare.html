<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nekudot vs Harmony — connection fidelity</title>
    <style>
      body { margin: 0; background: #fff; color: #222; font: 12px system-ui; }
      #grid { display: grid; grid-template-columns: repeat(5, max-content); gap: 8px 12px; padding: 14px; align-items: start; }
      .cell { text-align: center; }
      .cell canvas { display: block; border: 1px solid #bbb; background: #fff; }
      .cap { margin-top: 3px; font-size: 11px; color: #444; white-space: pre; }
      .colhead { font-weight: 600; font-size: 12px; padding-bottom: 2px; }
      .rowhead { writing-mode: vertical-rl; transform: rotate(180deg); font-weight: 600; align-self: center; }
    </style>
  </head>
  <body>
    <div id="grid"></div>
    <script type="module">
      // Faithful side-by-side: the REAL Nekudot engine vs a port of mrdoob's
      // Harmony brushes, identical gesture, for Airy/StringArt/Shading. Columns
      // expose where they diverge and whether a fix matches Harmony.
      import { CanvasRenderer } from "/src/renderer.ts";
      import { createNeighborFinder } from "/src/neighbor-finder.ts";
      import { createBareHost } from "/src/paint-host.ts";
      import { RoundBrush } from "/src/brushes/round.ts";

      const W = 1000, H = 300, SEED = 1234;

      function mulberry32(seed) {
        let s = seed >>> 0;
        return () => { s = (s + 0x6d2b79f5) >>> 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
      }

      // One scribbly path; sample it at a given spacing (px). Smaller spacing =
      // denser input (emulates getCoalescedEvents() oversampling on fast pointers).
      // Gentle sine (low curvature) — matches the real-app ground-truth gesture,
      // where connections run mostly ALONG the line (the stress case for build-up).
      function pathPoint(t) {
        const x = 60 + t * (W - 120);
        const y = H / 2 + 90 * Math.sin((x - 60) / 110);
        return [x, y];
      }
      function gesture(spacing) {
        let len = 0, prev = pathPoint(0);
        for (let i = 1; i <= 600; i++) { const p = pathPoint(i / 600); len += Math.hypot(p[0]-prev[0], p[1]-prev[1]); prev = p; }
        const n = Math.max(2, Math.round(len / spacing));
        const pts = []; for (let i = 0; i <= n; i++) pts.push(pathPoint(i / n));
        return pts;
      }

      function measure(ctx) {
        const d = ctx.getImageData(0, 0, W, H).data;
        let mass = 0; for (let i = 0; i < d.length; i += 4) mass += 1 - (0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]) / 255;
        return mass;
      }

      function newCanvas(baseAlpha) {
        const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
        const ctx = cv.getContext("2d", { willReadFrequently: true });
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = baseAlpha;
        return { cv, ctx };
      }

      // Nekudot real engine. overrides = applyFlat patch (params + sampleSpacing).
      function renderNek(preset, passes, gesturePts, baseAlpha, overrides) {
        const { cv, ctx } = newCanvas(baseAlpha);
        const r = new CanvasRenderer(ctx, { dpr: 1 }); r.setStrokeStyle("#000");
        const finder = createNeighborFinder("quadtree", []);
        const b = new RoundBrush(createBareHost(r, finder), SEED);
        b.applyArtStylePreset(preset);
        if (overrides) b.activeConnection().applyFlat(overrides);
        for (let p = 0; p < passes; p++) {
          ctx.globalAlpha = baseAlpha;
          b.strokeStart(gesturePts[0][0], gesturePts[0][1]);
          for (const [x, y] of gesturePts) b.stroke(x, y);
          b.strokeEnd();
        }
        return { cv, mass: measure(ctx) };
      }

      // Harmony port (faithful to js/brushes/{sketchy,web,shaded}.js). points
      // persists across passes, like the real brush within a session.
      function renderHarmony(kind, passes, gesturePts) {
        const { cv, ctx } = newCanvas(1);
        const rng = mulberry32(SEED);
        const points = []; let count = 0, prevX = 0, prevY = 0;
        ctx.lineWidth = 1; ctx.lineCap = "butt";
        const col = "0,0,0";
        const run = () => {
          prevX = gesturePts[0][0]; prevY = gesturePts[0][1];
          for (const [x, y] of gesturePts) {
            points.push([x, y]);
            const cx = points[count][0], cy = points[count][1];
            if (kind === "sketchy") {
              ctx.strokeStyle = `rgba(${col},0.05)`;
              ctx.beginPath(); ctx.moveTo(prevX, prevY); ctx.lineTo(x, y); ctx.stroke();
              for (let i = 0; i < points.length; i++) { const dx = points[i][0]-cx, dy = points[i][1]-cy, d = dx*dx+dy*dy; if (d < 4000 && rng() > d/2000) { ctx.beginPath(); ctx.moveTo(cx+dx*0.3, cy+dy*0.3); ctx.lineTo(points[i][0]-dx*0.3, points[i][1]-dy*0.3); ctx.stroke(); } }
            } else if (kind === "web") {
              ctx.strokeStyle = `rgba(${col},0.5)`;
              ctx.beginPath(); ctx.moveTo(prevX, prevY); ctx.lineTo(x, y); ctx.stroke();
              ctx.strokeStyle = `rgba(${col},0.1)`;
              for (let i = 0; i < points.length; i++) { const dx = points[i][0]-cx, dy = points[i][1]-cy, d = dx*dx+dy*dy; if (d < 2500 && rng() > 0.9) { ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(points[i][0], points[i][1]); ctx.stroke(); } }
            } else if (kind === "shaded") {
              for (let i = 0; i < points.length; i++) { const dx = points[i][0]-cx, dy = points[i][1]-cy, d = dx*dx+dy*dy; if (d < 1000) { ctx.strokeStyle = `rgba(${col},${(1-d/1000)*0.1})`; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(points[i][0], points[i][1]); ctx.stroke(); } }
            }
            prevX = x; prevY = y; count++;
          }
        };
        for (let p = 0; p < passes; p++) run();
        return { cv, mass: measure(ctx) };
      }

      const PASSES = 3;
      const FRAME = 6;   // realistic per-frame mouse spacing
      const DENSE = 1.5; // oversampled (coalesced) spacing
      const STYLES = [
        { row: "Airy",       nek: "classic", harm: "sketchy", baseAlpha: 0.05, tuned: { alpha: 0.05, sampleSpacing: 0 } },
        { row: "String Art", nek: "web",     harm: "web",     baseAlpha: 0.5,  tuned: { alpha: 0.1, density: 10, radius: 50, sampleSpacing: 0 } },
        { row: "Shading",    nek: "shaded",  harm: "shaded",  baseAlpha: 0,    tuned: { sampleSpacing: 0 } },
      ];
      const COLS = [
        { head: "Harmony (ref, 6px)", kind: "harm", spacing: FRAME },
        { head: "Nekudot current\n(ss=4, oversampled)", kind: "nek", spacing: DENSE, ss: 4 },
        { head: "Nekudot fix\n(ss=0, frame 6px)", kind: "nek", spacing: FRAME, ss: 0 },
        { head: "Nekudot tuned\n(ss=0, matched params)", kind: "tuned", spacing: FRAME },
      ];

      const grid = document.getElementById("grid");
      const addCell = (node, cap) => { const c = document.createElement("div"); c.className = "cell"; if (node) c.appendChild(node); const p = document.createElement("div"); p.className = "cap"; p.textContent = cap; c.appendChild(p); grid.appendChild(c); };

      // header row
      addCell(null, "");
      for (const col of COLS) { const h = document.createElement("div"); h.className = "colhead"; h.style.whiteSpace = "pre"; h.textContent = col.head; addCell(h, ""); }

      const ink = {};
      for (const s of STYLES) {
        const rh = document.createElement("div"); rh.className = "rowhead"; rh.textContent = s.row; addCell(rh, "");
        ink[s.row] = {};
        for (const col of COLS) {
          const pts = gesture(col.spacing);
          let res;
          if (col.kind === "harm") res = renderHarmony(s.harm, PASSES, pts);
          else if (col.kind === "tuned") res = renderNek(s.nek, PASSES, pts, s.baseAlpha, s.tuned);
          else res = renderNek(s.nek, PASSES, pts, s.baseAlpha, { sampleSpacing: col.ss });
          ink[s.row][col.head] = Math.round(res.mass);
          addCell(res.cv, `ink ${Math.round(res.mass)}`);
        }
      }

      window.__ink = ink;

      // Mechanism check: stroke(x,y,false) must draw the mark but NOT grow the
      // point cloud — that's what lets the pointer loop sample the web at frame
      // cadence while still drawing every coalesced sub-sample.
      {
        const f = createNeighborFinder("quadtree", []);
        const { ctx } = newCanvas(1);
        const b2 = new RoundBrush(createBareHost(new CanvasRenderer(ctx, { dpr: 1 }), f), SEED);
        b2.applyArtStylePreset("classic");
        b2.strokeStart(10, 10);
        b2.stroke(10, 10, true);   // frame point → deposits
        b2.stroke(20, 10, false);  // sub-frame → visual only
        b2.stroke(30, 10, false);  // sub-frame → visual only
        b2.stroke(40, 10, true);   // frame point → deposits
        b2.strokeEnd();
        window.__sampleFlag = { deposited: f.pixelCount(), expected: 2 };
      }
      window.__done = true;
    </script>
  </body>
</html>
