<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Handfree demo</title>
    <style>
      body { margin: 0; background: #2b2b2b; font: 13px system-ui, sans-serif; color: #ddd; }
      #grid { display: grid; grid-template-columns: repeat(2, max-content); gap: 18px; padding: 18px; }
      figure { margin: 0; text-align: center; }
      figure canvas { display: block; border: 1px solid #555; background: #fff; }
      figcaption { margin-top: 6px; }
    </style>
  </head>
  <body>
    <div id="grid"></div>
    <script type="module">
      import { CanvasRenderer } from "/src/renderer.ts";
      import { createNeighborFinder } from "/src/neighbor-finder.ts";
      import { HandfreeBrush } from "/src/brushes/handfree.ts";

      const W = 600, H = 460, SEED = 1234;

      function set(brush, vals) {
        for (const s of brush.getSettings()) {
          if (s.key in vals) s.onChange(vals[s.key]);
        }
      }

      // Faint grid so we can see motifs land on junctions.
      function drawGrid(renderer, sx, sy) {
        const style = { color: "#cfcfcf", width: 0.5, alpha: 1 };
        for (let x = 0; x <= W; x += sx)
          renderer.drawLine({ id: 0, x, y: 0 }, { id: 0, x, y: H }, style);
        for (let y = 0; y <= H; y += sy)
          renderer.drawLine({ id: 0, x: 0, y }, { id: 0, x: W, y }, style);
      }

      function render(label, artStyle, motif, opts) {
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");
        const renderer = new CanvasRenderer(ctx, { dpr: 1 });
        renderer.fillBackground("#ffffff");
        renderer.setStrokeStyle("#16263a");

        const sx = opts.xSpacing, sy = opts.ySpacing;
        drawGrid(renderer, sx, sy);

        const finder = createNeighborFinder("quadtree", []);
        const brush = new HandfreeBrush(renderer, finder, SEED);
        brush.applyArtStylePreset(artStyle);
        set(brush, { xSpacing: sx, ySpacing: sy, reach: opts.reach, falloff: opts.falloff });

        brush.strokeStart(motif[0][0], motif[0][1]);
        for (const [x, y] of motif) brush.stroke(x, y);
        brush.strokeEnd();

        const fig = document.createElement("figure");
        fig.appendChild(canvas);
        const cap = document.createElement("figcaption");
        cap.textContent = label;
        fig.appendChild(cap);
        document.getElementById("grid").appendChild(fig);
      }

      // An asymmetric arrow motif near junction (100,100): easy to see it tile
      // (and orientation-preserved = faithful copy).
      const arrow = [
        [82, 100], [118, 100], [108, 90], [118, 100], [108, 110], [118, 100],
      ];
      // A little loop motif.
      const loop = [
        [100, 84], [114, 96], [108, 114], [90, 112], [86, 94], [100, 84], [100, 100],
      ];

      render("arrow · web style", "web", arrow, { xSpacing: 100, ySpacing: 100, reach: 320, falloff: 45 });
      render("loop · classic style", "classic", loop, { xSpacing: 90, ySpacing: 90, reach: 300, falloff: 55 });
      render("arrow · fur style", "fur", arrow, { xSpacing: 110, ySpacing: 110, reach: 300, falloff: 40 });
      render("loop · web, tight grid", "web", loop, { xSpacing: 60, ySpacing: 60, reach: 260, falloff: 60 });

      window.__renderDone = true;
    </script>
  </body>
</html>
