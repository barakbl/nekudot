<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Texture preset render</title>
    <style>
      body {
        margin: 0;
        background: #2b2b2b;
        font: 12px system-ui, sans-serif;
        color: #ddd;
      }
      #grid {
        display: grid;
        grid-template-columns: repeat(4, max-content);
        gap: 14px;
        padding: 16px;
      }
      figure {
        margin: 0;
        text-align: center;
      }
      figure canvas {
        display: block;
        border: 1px solid #555;
        background: #fff;
      }
      figcaption {
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div id="grid"></div>
    <script type="module">
      import { CanvasRenderer } from "/src/renderer.ts";
      import { createNeighborFinder } from "/src/neighbor-finder.ts";
      import { SoftPencilBrush } from "/src/brushes/soft-pencil.ts";

      const W = 240;
      const H = 200;
      const SEED = 1234;

      // Deterministic RNG for the test gesture's jitter (engine has its own).
      function mulberry32(seed) {
        let s = seed >>> 0;
        return () => {
          s = (s + 0x6d2b79f5) >>> 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // A few sparse, gently curved strokes with whitespace around them — like a
      // real gesture, so each preset's texture (wisps, hairs, scallops) reads
      // instead of saturating to a solid blob. Returns an array of strokes.
      function gestureStrokes() {
        const rnd = mulberry32(99);
        const jit = (v) => v + (rnd() - 0.5) * 5;
        const a = [], b = [];
        for (let x = 34; x <= W - 34; x += 7) {
          a.push([jit(x), jit(H * 0.42 + 26 * Math.sin(x / 28))]);
        }
        for (let x = 40; x <= W - 30; x += 7) {
          b.push([jit(x), jit(H * 0.66 + 18 * Math.sin(x / 22 + 1.7))]);
        }
        return [a, b];
      }

      function renderPreset(name) {
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");
        const renderer = new CanvasRenderer(ctx, { dpr: 1 });
        renderer.fillBackground("#ffffff");
        renderer.setStrokeStyle("#111111");

        const finder = createNeighborFinder("quadtree", []);
        const brush = new SoftPencilBrush(renderer, finder, SEED);
        brush.applyArtStylePreset(name); // the real preset → real engine path

        for (const stroke of gestureStrokes()) {
          brush.strokeStart(stroke[0][0], stroke[0][1]);
          for (const [x, y] of stroke) brush.stroke(x, y);
          brush.strokeEnd();
        }
        return canvas;
      }

      const order = ["classic", "web", "arc", "shaded", "fur", "lace"];
      const grid = document.getElementById("grid");
      for (const name of order) {
        const fig = document.createElement("figure");
        let canvas;
        try {
          canvas = renderPreset(name);
        } catch (e) {
          const cap = document.createElement("figcaption");
          cap.textContent = name + " — ERROR: " + e.message;
          fig.appendChild(cap);
          grid.appendChild(fig);
          continue;
        }
        const cap = document.createElement("figcaption");
        cap.textContent = name;
        fig.appendChild(canvas);
        fig.appendChild(cap);
        grid.appendChild(fig);
      }

      window.__renderDone = true;
    </script>
  </body>
</html>
