<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>stroke buffer — uniform opacity</title></head>
  <body>
    <script type="module">
      // Verifies the wet-stroke buffer: a faint continuous line drawn segment by
      // segment (round caps) normally doubles up at each joint → darker dots.
      // Buffered (beginStroke/endStroke) it composites once → uniform. We draw the
      // identical line both ways through the REAL LayerManager and measure the
      // darkness profile along the line.
      import { LayerManager } from "/src/layered/manager.ts";

      const W = 400, H = 120, DPR = 1, ALPHA = 0.4, WIDTH = 4, STEP = 6, Y = 60;

      function drawLine(m) {
        let lastX = 30;
        for (let x = 30 + STEP; x <= W - 30; x += STEP) {
          m.drawLine({ id: 0, x: lastX, y: Y }, { id: 0, x, y: Y }, { cap: "round", width: WIDTH });
          lastX = x;
        }
      }

      // composite the manager's layer canvases over white, return ImageData
      function readCanvas(container) {
        const tmp = document.createElement("canvas");
        tmp.width = W * DPR; tmp.height = H * DPR;
        const cx = tmp.getContext("2d");
        cx.fillStyle = "#fff"; cx.fillRect(0, 0, tmp.width, tmp.height);
        for (const c of container.querySelectorAll("canvas")) cx.drawImage(c, 0, 0);
        return cx.getImageData(0, 0, tmp.width, tmp.height).data;
      }

      // darkness profile along the line: for each x, the darkest pixel in the
      // column near y=Y (that's the line). Returns array over x.
      function profile(data) {
        const out = [];
        for (let x = 34; x <= W - 34; x++) {
          let maxDark = 0;
          for (let y = Y - 6; y <= Y + 6; y++) {
            const i = ((y * DPR) * (W * DPR) + x * DPR) * 4;
            const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
            maxDark = Math.max(maxDark, 1 - lum / 255);
          }
          out.push(maxDark);
        }
        return out;
      }

      function stats(prof) {
        const mean = prof.reduce((a, b) => a + b, 0) / prof.length;
        const min = Math.min(...prof), max = Math.max(...prof);
        const sd = Math.sqrt(prof.reduce((a, b) => a + (b - mean) ** 2, 0) / prof.length);
        return { mean, min, max, spread: max - min, cv: sd / mean };
      }

      function run(buffered) {
        const container = document.createElement("div");
        container.style.width = `${W}px`; container.style.height = `${H}px`;
        document.body.appendChild(container);
        const m = new LayerManager({ container, size: { width: W, height: H }, dpr: DPR });
        m.setStrokeStyle("#000"); m.setLineWidth(WIDTH); m.setGlobalAlpha(ALPHA);
        if (buffered) m.beginStroke();
        drawLine(m);
        if (buffered) m.endStroke();
        return stats(profile(readCanvas(container)));
      }

      const direct = run(false);
      const buf = run(true);
      window.__result = {
        direct, buffered: buf,
        // joints double at alpha<1 → direct has big spread / CV; buffered is flat
        directSpread: +direct.spread.toFixed(3),
        bufferedSpread: +buf.spread.toFixed(3),
        directCV: +direct.cv.toFixed(3),
        bufferedCV: +buf.cv.toFixed(3),
        // both should reach ~the same body darkness (uniform line ≈ alpha)
        bufferedMean: +buf.mean.toFixed(3),
        directMean: +direct.mean.toFixed(3),
      };
      window.__done = true;
    </script>
  </body>
</html>
