<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>density vs throttle</title></head>
  <body>
    <script type="module">
      // Does lowering connection density decouple web darkness from pointer
      // sample rate? Compares the "lower density" knob against a min-spacing
      // throttle, on Nekudot's real engine (Airy/classic), isolating web ink.
      import { CanvasRenderer } from "/src/renderer.ts";
      import { createNeighborFinder } from "/src/neighbor-finder.ts";
      import { createBareHost } from "/src/paint-host.ts";
      import { RoundBrush } from "/src/brushes/round.ts";

      const W = 600, H = 360, SEED = 1234;

      function pathPoint(t) {
        const x = 60 + t * (W - 120);
        const y = H / 2 + 70 * Math.sin((x - 60) / 70) + 18 * Math.sin((x - 60) / 23 + 1.3);
        return [x, y];
      }
      function gesture(mult = 1) {
        let len = 0, prev = pathPoint(0);
        for (let i = 1; i <= 400; i++) { const p = pathPoint(i / 400); len += Math.hypot(p[0]-prev[0], p[1]-prev[1]); prev = p; }
        const n = Math.max(2, Math.round((len / 6) * mult));
        const pts = []; for (let i = 0; i <= n; i++) pts.push(pathPoint(i / n));
        return pts;
      }
      // emulate the proposed min-spacing throttle: drop samples closer than T px
      // to the last kept one (path geometry governs density, not sample rate).
      function throttle(pts, T) {
        if (!T) return pts;
        const out = [pts[0]]; let [lx, ly] = pts[0];
        for (const [x, y] of pts) if (Math.hypot(x - lx, y - ly) >= T) { out.push([x, y]); lx = x; ly = y; }
        return out;
      }
      function measureMass(ctx) {
        const d = ctx.getImageData(0, 0, W, H).data; let m = 0;
        for (let i = 0; i < d.length; i += 4) m += 1 - (0.299*d[i]+0.587*d[i+1]+0.114*d[i+2]) / 255;
        return m;
      }
      // web ink for the real engine at a given density + "Sample step" dial value
      // (spacing), driven by the RAW dense gesture — so the engine's own throttle
      // (the new slider) is what governs build-up, exactly like the live app.
      function nekWeb(density, spacing, pts) {
        const mk = (dens) => {
          const cv = document.createElement("canvas"); cv.width = W; cv.height = H;
          const ctx = cv.getContext("2d", { willReadFrequently: true });
          ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 0.05;
          const r = new CanvasRenderer(ctx, { dpr: 1 }); r.setStrokeStyle("#000");
          const b = new RoundBrush(createBareHost(r, createNeighborFinder("quadtree", [])), SEED);
          b.applyArtStylePreset("classic");
          b.activeConnection().applyFlat({ density: dens, sampleSpacing: spacing });
          ctx.globalAlpha = 0.05;
          b.strokeStart(pts[0][0], pts[0][1]); for (const [x,y] of pts) b.stroke(x,y); b.strokeEnd();
          return measureMass(ctx);
        };
        return Math.max(0, mk(density) - mk(0));
      }

      const MULTS = [1, 2, 4];
      // group A: lower the density knob, throttle OFF (Sample step = 0)
      const densities = [45, 20, 10, 5];
      const byDensity = {};
      for (const d of densities) byDensity[d] = MULTS.map((m) => ({ mult: m, web: nekWeb(d, 0, gesture(m)) }));
      // group B: keep density 45, sweep the "Sample step" dial (the new slider)
      const spacings = [0, 2, 3, 4, 5, 6];
      const byThrottle = {};
      for (const T of spacings) byThrottle[T] = MULTS.map((m) => ({ mult: m, web: nekWeb(45, T, gesture(m)) }));

      window.__results = { byDensity, byThrottle, baseN: gesture(1).length };
      window.__done = true;
    </script>
  </body>
</html>
