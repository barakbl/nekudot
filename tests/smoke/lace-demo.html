<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lace demo</title>
    <style>
      body { margin: 0; background: #2b2b2b; font: 13px system-ui, sans-serif; color: #ddd; }
      #grid { display: grid; grid-template-columns: repeat(2, max-content); gap: 18px; padding: 18px; }
      figure { margin: 0; text-align: center; }
      figure canvas { display: block; border: 1px solid #555; background: #fff; }
      figcaption { margin-top: 6px; }
    </style>
  </head>
  <body>
    <div id="grid"></div>
    <script type="module">
      import { CanvasRenderer } from "/src/renderer.ts";
      import { createNeighborFinder } from "/src/neighbor-finder.ts";
      import { createBareHost } from "/src/paint-host.ts";
      import { SoftPencilBrush } from "/src/brushes/soft-pencil.ts";

      const SZ = 460;
      const SEED = 1234;

      function mulberry32(seed) {
        let s = seed >>> 0;
        return () => {
          s = (s + 0x6d2b79f5) >>> 0;
          let t = Math.imul(s ^ (s >>> 15), 1 | s);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // ---- a round lace doily / mat: rings + radial spokes + a centre rosette
      function doilyStrokes(rnd) {
        const cx = SZ / 2, cy = SZ / 2, out = [];
        const rings = [40, 78, 116, 154, 192];
        for (const R of rings) {
          const s = [], n = Math.max(8, Math.round((2 * Math.PI * R) / 16));
          for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2;
            s.push([cx + R * Math.cos(a) + (rnd() - 0.5) * 3, cy + R * Math.sin(a) + (rnd() - 0.5) * 3]);
          }
          out.push(s);
        }
        // radial spokes tie the rings into a net — kept off the centre so they
        // don't pile into a dark knot (spacing grows with radius, like real lace)
        for (let k = 0; k < 12; k++) {
          const a = (k / 12) * Math.PI * 2, s = [];
          for (let r = 64; r <= 192; r += 18)
            s.push([cx + r * Math.cos(a) + (rnd() - 0.5) * 3, cy + r * Math.sin(a) + (rnd() - 0.5) * 3]);
          out.push(s);
        }
        return out;
      }

      // ---- a landmass "map" cut from lace: wobbly coastline + sparse interior
      function mapStrokes(rnd) {
        const cx = SZ / 2, cy = SZ / 2, base = 150;
        const p1 = rnd() * 6.28, p2 = rnd() * 6.28, p3 = rnd() * 6.28;
        const R = (a) =>
          base * (1 + 0.2 * Math.sin(3 * a + p1) + 0.12 * Math.sin(5 * a + p2) + 0.07 * Math.sin(8 * a + p3));
        const out = [];
        // coastline (dense)
        const coast = [];
        for (let a = 0; a < Math.PI * 2; a += 11 / R(a)) {
          coast.push([cx + R(a) * Math.cos(a) + (rnd() - 0.5) * 3, cy + R(a) * Math.sin(a) + (rnd() - 0.5) * 3]);
        }
        out.push(coast);
        // interior fill (sparse serpentine, clipped inside the coast)
        let dir = 1;
        for (let y = -base; y <= base; y += 22) {
          const s = [];
          const xs = dir > 0 ? [-base, base] : [base, -base];
          for (let x = xs[0]; dir > 0 ? x <= xs[1] : x >= xs[1]; x += dir * 22) {
            const a = Math.atan2(y, x), d = Math.hypot(x, y);
            if (d < R(a) - 10) s.push([cx + x + (rnd() - 0.5) * 5, cy + y + (rnd() - 0.5) * 5]);
          }
          if (s.length) out.push(s);
          dir *= -1;
        }
        return out;
      }

      function render(label, strokesFn) {
        const canvas = document.createElement("canvas");
        canvas.width = SZ;
        canvas.height = SZ;
        const ctx = canvas.getContext("2d");
        const renderer = new CanvasRenderer(ctx, { dpr: 1 });
        renderer.fillBackground("#ffffff");
        renderer.setStrokeStyle("#1a1a1a");

        const finder = createNeighborFinder("quadtree", []);
        const brush = new SoftPencilBrush(createBareHost(renderer, finder), SEED);
        brush.applyArtStylePreset("lace");

        for (const stroke of strokesFn(mulberry32(99))) {
          brush.strokeStart(stroke[0][0], stroke[0][1]);
          for (const [x, y] of stroke) brush.stroke(x, y);
          brush.strokeEnd();
        }

        const fig = document.createElement("figure");
        fig.appendChild(canvas);
        const cap = document.createElement("figcaption");
        cap.textContent = label;
        fig.appendChild(cap);
        document.getElementById("grid").appendChild(fig);
      }

      render("lace mat (doily)", doilyStrokes);
      render("map made of lace", mapStrokes);
      window.__renderDone = true;
    </script>
  </body>
</html>
