<!doctype html>
<!--
  Cross-browser STRUCTURAL determinism probe (vector-replay P2.3, risk #1: ULP
  float drift across JS engines flipping neighbour-in-reach boundaries and so the
  web structure). Drives a FIXED, dense scripted stroke sequence through the real
  brushes + quadtree finder, counting the geometry calls (web lines + deposits) per
  stroke. The counts are a structural fingerprint of the web. If two engines agree,
  their fingerprints match byte-for-byte; a single flipped boundary changes a count.

  HOW TO RUN:
    1. npm run dev
    2. open http://localhost:5173/tests/smoke/replay-structural.html in EACH of
       Chrome, Firefox, Safari (same machine).
    3. compare the FINGERPRINT hash shown on each. All three equal => no cross-
       engine drift (risk #1 clear). Different => paste all three here.
-->
<meta charset="utf-8" />
<title>replay structural determinism probe</title>
<style>
  body { font: 14px ui-monospace, Menlo, monospace; margin: 24px; max-width: 760px; }
  h1 { font-size: 15px; }
  .hash { font-size: 20px; font-weight: 700; padding: 8px 12px; background: #eef; border-radius: 6px; display: inline-block; }
  pre { background: #f6f6f6; padding: 10px; overflow-x: auto; border-radius: 6px; }
  .ok { color: #2a7; }
</style>
<h1>Vector-replay structural determinism probe (risk #1)</h1>
<p id="engine"></p>
<p>Fingerprint (must be identical in Chrome / Firefox / Safari):</p>
<p><span id="hash" class="hash">…</span></p>
<pre id="detail"></pre>

<script type="module">
  import { BRUSH_DEFS } from "/src/brushes/registry.ts";
  import { createBareHost, GEOMETRY_METHODS } from "/src/paint-host.ts";
  import { MOUSE_SAMPLE } from "/src/pen.ts";
  import { MemoryStore, noopRenderer } from "/src/replay/bare-world.ts";
  import { createNeighborFinder } from "/src/neighbor-finder.ts";

  // A host that COUNTS each geometry method (draws + deposits) and delegates so the
  // finder still sees real points (so findNeighbors decisions are real).
  function countingHost() {
    const finder = createNeighborFinder("quadtree", []);
    const base = createBareHost(noopRenderer(), finder);
    const counts = Object.fromEntries(GEOMETRY_METHODS.map((m) => [m, 0]));
    const geom = new Set(GEOMETRY_METHODS);
    const host = new Proxy(base, {
      get(t, k, r) {
        if (typeof k === "string" && geom.has(k)) {
          const orig = base[k];
          return (...a) => { counts[k]++; return orig(...a); };
        }
        return Reflect.get(t, k, r);
      },
    });
    return { host, counts };
  }

  // A FIXED dense scribble: integer coords so quantization is irrelevant, a curving
  // overlapping path so many points sit near the reach boundary (ULP-sensitive).
  const STROKES = 6, N = 120, SEED = 0x9e3779b9;
  function scriptStroke(k) {
    const cx = 400 + 30 * Math.cos(k), cy = 400 + 30 * Math.sin(k);
    return Array.from({ length: N }, (_, i) => ({
      x: Math.round(cx + 50 * Math.cos(k + i * 0.35)),
      y: Math.round(cy + 50 * Math.sin(k + i * 0.35)),
      t: i * 8,
    }));
  }

  function fingerprint() {
    const { host, counts } = countingHost();
    const store = new MemoryStore();
    store.set("app.color.main", "#3355ff");
    store.set("app.color.secondary", "#888888");
    const def = BRUSH_DEFS.find((d) => d.name === "Round");
    const perStroke = [];
    for (let k = 0; k < STROKES; k++) {
      const before = counts.drawConnection + counts.drawConnectionToLayer + counts.addPixel;
      const brush = def.create({ host, store, getInvisibleOverlay: () => noopRenderer() });
      brush.setSeed(SEED + k);
      brush.captureStrokeContext();
      const s = scriptStroke(k);
      brush.strokeStart(s[0].x, s[0].y);
      brush.stroke(s[0].x, s[0].y, true, MOUSE_SAMPLE, s[0].t);
      for (let i = 1; i < s.length; i++) brush.stroke(s[i].x, s[i].y, true, MOUSE_SAMPLE, s[i].t);
      brush.strokeEnd();
      const after = counts.drawConnection + counts.drawConnectionToLayer + counts.addPixel;
      perStroke.push(after - before);
    }
    return { counts, perStroke };
  }

  const fnv = (s) => { let h = 0x811c9dc5 >>> 0; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 0x01000193) >>> 0; } return h.toString(16).padStart(8, "0"); };

  const { counts, perStroke } = fingerprint();
  const canonical = JSON.stringify({ perStroke, counts });
  document.getElementById("engine").textContent = navigator.userAgent;
  document.getElementById("hash").textContent = fnv(canonical);
  document.getElementById("detail").textContent =
    "per-stroke web+deposit counts: " + JSON.stringify(perStroke) + "\n\nall geometry counts:\n" + JSON.stringify(counts, null, 2);
</script>
