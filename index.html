<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile: map the canvas to real device pixels and disable pinch/double-tap
         zoom (it would fight drawing + the multi-finger undo/redo gestures);
         viewport-fit=cover so the canvas reaches under notches. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2c2d30" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Nekudot - drawing app</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nekudot" />
    <meta property="og:title" content="Nekudot - drawing app" />
    <meta
      property="og:description"
      content="A playful in-browser drawing app - dot brushes, connecting webs, symmetry and mandalas. Nothing is uploaded."
    />
    <meta property="og:url" content="https://nekudot.app/app/" />
    <meta property="og:image" content="https://nekudot.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A rainbow mandala bloomed from a single stroke in Nekudot" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nekudot - drawing app" />
    <meta
      name="twitter:description"
      content="A playful in-browser drawing app - dot brushes, connecting webs, symmetry and mandalas. Nothing is uploaded."
    />
    <meta name="twitter:image" content="https://nekudot.app/og.png" />
    <meta
      name="description"
      content="Nekudot is a playful in-browser drawing app - dot brushes, connecting webs, symmetry and mandalas, all on your device with nothing uploaded."
    />
    <meta name="color-scheme" content="dark light" />
    <!-- Privacy-friendly, cookieless analytics (Umami Cloud, EU-hosted; GDPR-compliant) -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="746f900c-0c69-4bf7-a88b-842b65ff790d"></script>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
