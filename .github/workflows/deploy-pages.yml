name: Deploy site to GitHub Pages

# Build the app (build.sh -> docs/app/index.html) and the Updates page
# (npm run build:updates -> docs/updates.html), then publish the whole docs/ tree
# (landing pages + book + the freshly built files + the CNAME) to GitHub Pages.
# This is what lets us stop committing the generated files - the deploy rebuilds
# them from source on every push to main.
#
# REQUIRES the repo's Pages "Source" to be set to "GitHub Actions"
# (Settings -> Pages). While it's still "Deploy from a branch", the deploy step
# has nowhere to publish and will fail - the live site keeps serving the last
# branch deploy, so flip the setting before relying on this.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One publish at a time; never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Regenerate the deployed app + Updates page into docs/ (over the committed
      # copies, if any). The build is deterministic, so this reproduces byte-for-byte.
      - name: Build the app + Updates page into docs/
        run: |
          bash build.sh
          npm run build:updates

      # Count the tests (collection only, no execution) and write a shields
      # "endpoint" JSON into the site, so the README tests badge auto-updates on
      # every deploy (served at https://nekudot.app/tests-badge.json).
      - name: Generate the tests-count badge
        run: |
          count=$(npx vitest list 2>/dev/null | grep -vcE '^[[:space:]]*$' || echo 0)
          if [ "$count" -ge 1 ] 2>/dev/null; then msg="$count passing"; color="brightgreen"; else msg="unknown"; color="lightgrey"; fi
          printf '{"schemaVersion":1,"label":"tests","message":"%s","color":"%s"}\n' "$msg" "$color" > docs/tests-badge.json
          cat docs/tests-badge.json

      - uses: actions/configure-pages@v6

      # Publish the whole docs/ site: landing pages, book, the freshly built
      # app (/app/) + Updates page, and the CNAME (custom domain).
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        # The build + the deployment CREATE both succeed, but GitHub Pages' publish
        # backend intermittently reports "Deployment failed, try again later" a few
        # seconds later - a transient (it hits isolated deploys with no collision).
        # Don't fail the run on the first attempt; retry once below.
        continue-on-error: true
      - if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
