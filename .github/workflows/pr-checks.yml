name: pr-checks

# Enforces the Conventional Commit + branch conventions that feed release-please.
# Make these required status checks (with squash-merge) so the PR title becomes
# the changelog/commit line on main.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-title:
    name: PR title is a Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            build
            ci
            chore
            revert
          requireScope: false
          # Subject should read like a changelog line: not capitalised, no trailing period.
          subjectPattern: ^(?![A-Z]).+[^.]$
          subjectPatternError: "PR title subject must start lowercase and not end with a period."

  branch-name:
    name: Branch name has a type prefix
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          # release-please and Dependabot maintain their own branch names; exempt them.
          case "$BRANCH" in
            release-please--*) exit 0 ;;
            dependabot/*) exit 0 ;;
          esac
          if ! echo "$BRANCH" | grep -Eq '^(feat|fix|perf|refactor|docs|test|build|ci|chore|revert)/.+'; then
            echo "::error::Branch '$BRANCH' must start with a type prefix, e.g. feat/, fix/, chore/."
            exit 1
          fi
