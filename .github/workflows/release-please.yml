name: release-please

# Maintains a "release PR" that bumps package.json, updates CHANGELOG.md from the
# Conventional Commit titles merged since the last release, and (on merge) tags
# vX.Y.Z + cuts a GitHub Release. Squash-merge so each PR's title is the commit
# release-please reads.
#
# Token: set a RELEASE_TOKEN secret (a fine-grained PAT or GitHub App token with
# contents:write + pull-requests:write). It's required for two reasons — its PRs
# (and the rebuild push below) then trigger CI, and it can push the rebuilt app.
# Falls back to GITHUB_TOKEN if unset (works, but its PRs won't trigger CI).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # On a new release, seed a hidden draft Updates entry for the version so it
      # isn't missed on the Updates page. (The deployed app is built + published by
      # deploy-pages.yml - no committed bundle to rebuild.) Needs RELEASE_TOKEN so
      # this push triggers CI.
      - if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: npm ci
      - if: ${{ steps.release.outputs.prs_created == 'true' }}
        name: Draft the Updates entry for the release
        run: |
          # Drop a hidden draft stub for the new version (stays hidden until
          # rewritten in an artist-friendly voice with draft: false). The deployed
          # app itself is built + published by deploy-pages.yml - nothing to rebuild.
          node scripts/build-updates.mjs --sync
          git add docs/updates
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: draft updates entry for release"
            git push
          fi
