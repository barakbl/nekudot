name: CI

# Lint, typecheck, test, and build the deployed app to catch build breakage.
# The build output (docs/app/index.html + docs/updates.html) is no longer
# committed - deploy-pages.yml publishes it - so this just proves it builds.
#
# Runs on every branch push (public repo = unlimited Actions minutes), so you
# get verification before opening a PR. No separate pull_request trigger: a push
# run reports its check on the head commit, which still satisfies a PR's required
# status check - and that avoids running twice per push once a PR is open. (Add a
# fork-aware pull_request trigger if external contributors ever open PRs.)
on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on normal branches, but not on release-please's
  # branch: the bot pushes follow-up commits, and cancelling the prior run
  # surfaces as a failed check on the release PR (a cancel, not a real failure
  # - a re-run goes green). See PR #93.
  cancel-in-progress: ${{ !startsWith(github.ref_name, 'release-please--') }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      # Build the deployed app + Updates page to catch build breakage. The output
      # isn't committed (deploy-pages.yml publishes it), so there's nothing to
      # compare against here - this just proves `bash build.sh` succeeds.
      - name: Build the deployed app
        run: bash build.sh
