name: 💡 Feature request
description: Suggest a new feature or an improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! 🎨 Suggestions from artists and developers alike shape Nekudot.
  - type: checkboxes
    id: checks
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find the same request.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The problem, or the moment while drawing where you wished for this. ("It would be lovely if..." is perfectly fine.)
      placeholder: When I draw ..., I wish I could ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Anything you've tried, or other ways this could work.
    validations:
      required: false
  - type: textarea
    id: mockups
    attributes:
      label: Sketches, mockups or references
      description: Drag in any images or links that help show the idea.
    validations:
      required: false
